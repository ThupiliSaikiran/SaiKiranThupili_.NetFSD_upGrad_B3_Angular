<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    h1{
  text-align: center;
  margin-bottom: 20px;
}

.container{
  width:80%;
  margin: auto;
}

.container p{
  text-align: right;
  font-weight: bold;
  font-size: 16px;
}

.cards{
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap:20px;
}

.card{
  border: 1px solid #ddd;
  padding: 15px;          
  display: flex;
  flex-direction: column;
  align-items: baseline;
  border-radius: 6px;    
  box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
  transition: 0.3s;
  background-color: #fff;
}

.card:hover{
  transform: translateY(-5px);  
}

.card img{
  width: 100%;
  height: 250px;
  object-fit: cover;   
  border-radius: 4px;
}

.card button{
  padding: 8px 12px;
  background-color: #007bff;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: 0.3s;
}

.card button:hover{
  background-color: #0056b3;
}

.added{
  display: none;
}
  </style>
</head>

<body>
  <h1>Product List with Add to Cart Counter</h1>
  <div class="container">
    <p id="Cart">Cart : 0</p>
    <div class="cards">
      <div class="card">
        <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/mobile/u/b/9/-original-imahgctgvmt6kjyn.jpeg?q=90" alt="">
        <p><strong>Product Name:</strong> <span class="pname">MOTO g06</span></p>
        <button class="btn">Add To Cart</button>

      </div> 

      <div class="card">
        <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/mobile/v/m/x/-original-imah7jspd8dcxfut.jpeg?q=90" alt="">
        <p><strong>Product Name:</strong> <span class="pname">POCO M7 Pro</span> </p>
        <button class="btn">Add To Cart</button>

      </div> 

      <div class="card">
        <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/mobile/z/9/n/-original-imahgdr4shzrvcfh.jpeg?q=90" alt="">
        <p><strong>Product Name:</strong> <span class="pname">realme P4x 5G</span></p>
        <button class="btn">Add To Cart</button>

      </div> 

      <div class="card">
        <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/mobile/4/c/b/-original-imahfkvezr4fcets.jpeg?q=90" alt="">
        <p><strong>Product Name:</strong> <span class="pname">vivo T4 Pro 5G </span></p>
        <button class="btn">Add To Cart</button>

      </div> 

      <div class="card">
        <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/mobile/i/v/y/-original-imahgy25rwrgpyuv.jpeg?q=90" alt="">
        <p><strong>Product Name:</strong> <span class="pname">Samsung Galaxy A35</span></p>
        <button class="btn">Add To Cart</button>

      </div> 

      <div class="card">
        <img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/mobile/3/n/p/-original-imahcfcfwzp8sydh.jpeg?q=90" alt="">
        <p><strong>Product Name:</strong> <span class="pname">Nothing Phone (3a)</span> </p>
        <button class="btn">Add To Cart</button>

      </div> 
    </div>
  </div>



  <script src="https://code.jquery.com/jquery-4.0.0.js"></script>

  <script>
    let cart=[]
    function showCart(){
      $("#Cart").text(`Cart : ${cart.length}`)
    }

    $(".btn").click(function(){
   
     
      let m = $(this).closest(".card").find(".pname").text();
       cart.push(m)
       alert(`${m}! Added successfully`)
       showCart()
  
       $(this).prop("disabled", true).text("Added");
    })

    
  </script>
</body>

</html>
