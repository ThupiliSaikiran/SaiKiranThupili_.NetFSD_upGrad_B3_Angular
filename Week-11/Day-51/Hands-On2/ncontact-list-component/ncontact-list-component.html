<style>
  table,th,td {
    border-collapse: collapse;
    

  }
  th,td{
    padding: 10px;
    font-size: 20px;
  }
</style>

<h1 style="text-align:center">Contact List</h1>

<table border="2" align="center">
  <tr>
    <th>Id</th>
    <th>Name</th>
    <th>Email</th>
    <th>Phone No</th>
  </tr>
  @for (contact of contactList; track contact.id){
    <tr>
      <td>{{contact.id}}</td>
      <td>{{contact.name}}</td>
      <td>{{contact.email}}</td>
      <td>{{contact.phone}}</td>
      <td><a [routerLink]="['/contact', contact.id]">View Details</a></td>
    </tr>
  }
</table>
